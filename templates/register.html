{% extends "base.html" %}
{% block title %}Register Student{% endblock %}
{% block content %}
<h2 class="mb-4">Register New Student</h2>
<div class="row">
    <div class="col-md-6">
        <form method="POST" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Department</label>
                <select name="department" class="form-select" required>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics & Communication">Electronics & Communication</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="number" name="semester" class="form-control" min="1" max="8" required>
            </div>
            <input type="hidden" name="image_data" id="image_data">
            <button type="submit" class="btn btn-primary">Register Student</button>
        </form>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <video id="video" width="100%" autoplay class="mb-3 bg-dark rounded"></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <button id="captureBtn" class="btn btn-success mb-2">Capture Face</button>
                <p class="text-muted small">Ensure good lighting and look directly at the camera.</p>
                <img id="capturedImage" class="img-fluid rounded mt-2" style="display:none; max-height: 200px;">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const imageDataInput = document.getElementById('image_data');
    const capturedImage = document.getElementById('capturedImage');

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("Camera access denied. Please allow camera permissions."); });

    captureBtn.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataURL = canvas.toDataURL('image/jpeg');
        imageDataInput.value = dataURL;
        
        capturedImage.src = dataURL;
        capturedImage.style.display = 'block';
        captureBtn.textContent = 'Recapture';
    });
</script>
{% endblock %}
