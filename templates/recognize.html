{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}
<h2 class="mb-4">Real-Time Face Recognition</h2>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body text-center">
                <p class="text-muted">Look at the camera. Attendance will be marked automatically.</p>
                <img src="{{ url_for('video_feed') }}" class="img-fluid rounded border" style="max-width: 100%;">
            </div>
        </div>
    </div>
</div>
{% endblock %}
